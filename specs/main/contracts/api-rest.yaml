openapi: 3.0.3
info:
  title: Etnopapers API
  description: |
    API REST para sistema de extração de metadados de artigos científicos sobre etnobotânica.

    **Características**:
    - Backend minimalista (não processa IA, apenas armazena metadados)
    - Frontend faz chamadas diretas às APIs de IA externas
    - SQLite como banco de dados
    - Validação taxonômica via APIs externas (GBIF, Tropicos)

    **Fluxo de Processamento**:
    1. Frontend extrai texto do PDF e chama API de IA (Gemini/ChatGPT/Claude)
    2. API de IA retorna JSON com metadados
    3. Frontend POST /api/articles com metadados extraídos
    4. Backend valida taxonomia e salva no SQLite

  version: 1.0.0
  contact:
    name: Etnopapers
  license:
    name: MIT

servers:
  - url: http://localhost:8000/api
    description: Servidor de desenvolvimento
  - url: http://{server_ip}:8000/api
    description: Servidor UNRAID
    variables:
      server_ip:
        default: 192.168.1.100

tags:
  - name: Articles
    description: Operações sobre artigos científicos
  - name: Species
    description: Consulta de espécies de plantas
  - name: Regions
    description: Consulta de regiões de estudo
  - name: Communities
    description: Consulta de comunidades tradicionais
  - name: Drafts
    description: Gerenciamento de rascunhos
  - name: Taxonomy
    description: Validação taxonômica

paths:
  /articles:
    get:
      tags:
        - Articles
      summary: Listar artigos
      description: Retorna lista de artigos com filtros opcionais
      parameters:
        - name: status
          in: query
          description: Filtrar por status
          schema:
            type: string
            enum: [rascunho, finalizado]
        - name: year
          in: query
          description: Filtrar por ano de publicação
          schema:
            type: integer
            minimum: 1900
            maximum: 2100
        - name: limit
          in: query
          description: Número máximo de resultados
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Offset para paginação
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Lista de artigos
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total de artigos (sem limite)
                  limit:
                    type: integer
                  offset:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArticleSummary'

    post:
      tags:
        - Articles
      summary: Criar novo artigo
      description: |
        Cria novo artigo com metadados extraídos pela IA.
        Backend executa validação taxonômica antes de salvar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreate'
      responses:
        '201':
          description: Artigo criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /articles/{id}:
    get:
      tags:
        - Articles
      summary: Obter artigo por ID
      description: Retorna artigo completo com relacionamentos (regiões, comunidades, espécies)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Artigo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '404':
          description: Artigo não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Articles
      summary: Atualizar artigo
      description: |
        Atualiza metadados de artigo existente.
        Marca automaticamente `editado_manualmente` como true.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleUpdate'
      responses:
        '200':
          description: Artigo atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '404':
          description: Artigo não encontrado
        '400':
          description: Dados inválidos

    delete:
      tags:
        - Articles
      summary: Excluir artigo
      description: |
        Remove artigo e todas as associações (cascade).
        Espécies, regiões e comunidades não são excluídas (apenas desassociadas).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Artigo excluído
        '404':
          description: Artigo não encontrado

  /articles/{id}/finalize:
    post:
      tags:
        - Articles
      summary: Finalizar rascunho
      description: Muda status de 'rascunho' para 'finalizado'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Artigo finalizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '400':
          description: Artigo já está finalizado
        '404':
          description: Artigo não encontrado

  /drafts:
    get:
      tags:
        - Drafts
      summary: Listar rascunhos
      description: Retorna artigos com status 'rascunho'
      responses:
        '200':
          description: Lista de rascunhos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArticleSummary'

  /drafts/cleanup:
    delete:
      tags:
        - Drafts
      summary: Limpar rascunhos antigos
      description: Remove rascunhos com mais de 7 dias
      responses:
        '200':
          description: Rascunhos removidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted_count:
                    type: integer
                    description: Número de rascunhos excluídos

  /species:
    get:
      tags:
        - Species
      summary: Listar espécies de plantas
      description: Retorna lista de espécies com filtros opcionais
      parameters:
        - name: family
          in: query
          description: Filtrar por família botânica
          schema:
            type: string
        - name: validation_status
          in: query
          description: Filtrar por status de validação
          schema:
            type: string
            enum: [validado, não validado, erro]
        - name: search
          in: query
          description: Buscar por nome científico ou vernacular
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de espécies
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Species'

  /species/{id}:
    get:
      tags:
        - Species
      summary: Obter espécie por ID
      description: Retorna espécie com lista de artigos que a mencionam
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Espécie encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeciesDetailed'
        '404':
          description: Espécie não encontrada

  /species/validate:
    post:
      tags:
        - Taxonomy
      summary: Validar nome científico
      description: |
        Valida nome científico via API de taxonomia (GBIF ou Tropicos).
        Retorna nome aceito atual, família botânica e autores.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scientific_name:
                  type: string
                  example: "Uncaria tomentosa"
              required:
                - scientific_name
      responses:
        '200':
          description: Validação bem-sucedida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxonomyValidation'
        '404':
          description: Nome não encontrado nas APIs de taxonomia
        '503':
          description: APIs de taxonomia indisponíveis

  /regions:
    get:
      tags:
        - Regions
      summary: Listar regiões
      description: Retorna lista de regiões de estudo
      parameters:
        - name: country
          in: query
          description: Filtrar por país
          schema:
            type: string
        - name: state
          in: query
          description: Filtrar por estado/província
          schema:
            type: string
      responses:
        '200':
          description: Lista de regiões
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Region'

  /regions/{id}:
    get:
      tags:
        - Regions
      summary: Obter região por ID
      description: Retorna região com artigos e comunidades associadas
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Região encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionDetailed'
        '404':
          description: Região não encontrada

  /communities:
    get:
      tags:
        - Communities
      summary: Listar comunidades
      description: Retorna lista de comunidades tradicionais
      parameters:
        - name: type
          in: query
          description: Filtrar por tipo de comunidade
          schema:
            type: string
            enum: [indígena, quilombola, ribeirinha, caiçara, seringueira, pantaneira, outro]
      responses:
        '200':
          description: Lista de comunidades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Community'

  /communities/{id}:
    get:
      tags:
        - Communities
      summary: Obter comunidade por ID
      description: Retorna comunidade com artigos associados
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Comunidade encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityDetailed'
        '404':
          description: Comunidade não encontrada

  /health:
    get:
      summary: Health check
      description: Verifica status do servidor e conexão com banco de dados
      responses:
        '200':
          description: Servidor operacional
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  database:
                    type: string
                    example: "connected"
                  version:
                    type: string
                    example: "1.0.0"

components:
  schemas:
    ArticleSummary:
      type: object
      properties:
        id:
          type: integer
        titulo:
          type: string
        ano_publicacao:
          type: integer
        autores:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [rascunho, finalizado]
        data_processamento:
          type: string
          format: date-time
        total_especies:
          type: integer
          description: Número de espécies mencionadas

    Article:
      type: object
      properties:
        id:
          type: integer
        titulo:
          type: string
        doi:
          type: string
          nullable: true
        ano_publicacao:
          type: integer
        local_publicacao:
          type: string
          nullable: true
        autores:
          type: array
          items:
            type: string
        resumo:
          type: string
          nullable: true
        status:
          type: string
          enum: [rascunho, finalizado]
        editado_manualmente:
          type: boolean
        data_processamento:
          type: string
          format: date-time
        data_ultima_modificacao:
          type: string
          format: date-time
        dados_estudo:
          $ref: '#/components/schemas/StudyData'
        regioes:
          type: array
          items:
            $ref: '#/components/schemas/Region'
        comunidades:
          type: array
          items:
            $ref: '#/components/schemas/Community'
        especies:
          type: array
          items:
            $ref: '#/components/schemas/ArticleSpecies'

    ArticleCreate:
      type: object
      required:
        - titulo
        - ano_publicacao
        - autores
      properties:
        titulo:
          type: string
          minLength: 1
          maxLength: 500
        doi:
          type: string
          pattern: '^10\.\d{4,}/\S+$'
          nullable: true
        ano_publicacao:
          type: integer
          minimum: 1900
          maximum: 2100
        local_publicacao:
          type: string
          nullable: true
        autores:
          type: array
          items:
            type: string
          minItems: 1
        resumo:
          type: string
          nullable: true
        status:
          type: string
          enum: [rascunho, finalizado]
          default: rascunho
        dados_estudo:
          $ref: '#/components/schemas/StudyDataCreate'
        regioes:
          type: array
          items:
            $ref: '#/components/schemas/RegionCreate'
        comunidades:
          type: array
          items:
            $ref: '#/components/schemas/CommunityCreate'
        especies:
          type: array
          items:
            $ref: '#/components/schemas/SpeciesCreate'

    ArticleUpdate:
      type: object
      properties:
        titulo:
          type: string
        doi:
          type: string
        ano_publicacao:
          type: integer
        local_publicacao:
          type: string
        autores:
          type: array
          items:
            type: string
        resumo:
          type: string
        status:
          type: string
          enum: [rascunho, finalizado]

    StudyData:
      type: object
      properties:
        periodo_inicio:
          type: string
          format: date
          nullable: true
        periodo_fim:
          type: string
          format: date
          nullable: true
        duracao_meses:
          type: integer
          nullable: true
        metodos_coleta_dados:
          type: string
          nullable: true
        tipo_amostragem:
          type: string
          nullable: true
        tamanho_amostra:
          type: integer
          nullable: true
        instrumentos_coleta:
          type: array
          items:
            type: string
          nullable: true

    StudyDataCreate:
      type: object
      properties:
        periodo_inicio:
          type: string
          format: date
        periodo_fim:
          type: string
          format: date
        metodos_coleta_dados:
          type: string
        tipo_amostragem:
          type: string
        tamanho_amostra:
          type: integer
        instrumentos_coleta:
          type: array
          items:
            type: string

    Species:
      type: object
      properties:
        id:
          type: integer
        nome_cientifico:
          type: string
        autores_nome_cientifico:
          type: string
          nullable: true
        familia_botanica:
          type: string
          nullable: true
        nome_aceito_atual:
          type: string
          nullable: true
        status_validacao:
          type: string
          enum: [validado, não validado, erro]
        fonte_validacao:
          type: string
          enum: [GBIF, Tropicos, manual]
          nullable: true
        nomes_vernaculares:
          type: array
          items:
            type: string
          nullable: true
        usos_reportados:
          type: array
          items:
            type: string
          nullable: true

    SpeciesDetailed:
      allOf:
        - $ref: '#/components/schemas/Species'
        - type: object
          properties:
            artigos:
              type: array
              items:
                $ref: '#/components/schemas/ArticleSummary'
            total_artigos:
              type: integer

    SpeciesCreate:
      type: object
      required:
        - nome_cientifico
      properties:
        nome_cientifico:
          type: string
        nomes_vernaculares:
          type: array
          items:
            type: string
        contexto_uso:
          type: string
          description: Como foi usada neste artigo específico
        parte_planta_utilizada:
          type: array
          items:
            type: string

    ArticleSpecies:
      allOf:
        - $ref: '#/components/schemas/Species'
        - type: object
          properties:
            contexto_uso:
              type: string
            parte_planta_utilizada:
              type: array
              items:
                type: string

    Region:
      type: object
      properties:
        id:
          type: integer
        descricao:
          type: string
        pais:
          type: string
          nullable: true
        estado_provincia:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true

    RegionDetailed:
      allOf:
        - $ref: '#/components/schemas/Region'
        - type: object
          properties:
            artigos:
              type: array
              items:
                $ref: '#/components/schemas/ArticleSummary'
            comunidades:
              type: array
              items:
                $ref: '#/components/schemas/Community'

    RegionCreate:
      type: object
      required:
        - descricao
      properties:
        descricao:
          type: string
        pais:
          type: string
        estado_provincia:
          type: string
        latitude:
          type: number
        longitude:
          type: number

    Community:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        tipo_comunidade:
          type: string
          enum: [indígena, quilombola, ribeirinha, caiçara, seringueira, pantaneira, outro]
          nullable: true

    CommunityDetailed:
      allOf:
        - $ref: '#/components/schemas/Community'
        - type: object
          properties:
            artigos:
              type: array
              items:
                $ref: '#/components/schemas/ArticleSummary'

    CommunityCreate:
      type: object
      required:
        - nome
      properties:
        nome:
          type: string
        tipo_comunidade:
          type: string
          enum: [indígena, quilombola, ribeirinha, caiçara, seringueira, pantaneira, outro]

    TaxonomyValidation:
      type: object
      properties:
        nome_cientifico_original:
          type: string
        nome_aceito_atual:
          type: string
        autores_nome_cientifico:
          type: string
        familia_botanica:
          type: string
        status:
          type: string
          enum: [accepted, synonym]
        fonte:
          type: string
          enum: [GBIF, Tropicos]
        is_synonym:
          type: boolean
        sinonimo_de:
          type: string
          description: Nome aceito se for sinônimo

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true

    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: "Validation error"
        fields:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
